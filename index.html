<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShadowPocket</title>
  <style>
    :root {
      color-scheme: light dark;
      --accent: #0f766e;
      --text: #1f2937;
      --muted: #4b5563;
      --bg: #f8fafc;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --accent: #2dd4bf;
        --text: #f3f4f6;
        --muted: #cbd5e1;
        --bg: #0f172a;
      }
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2.25rem;
      line-height: 1.2;
    }

    p {
      color: var(--muted);
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>ShadowPocket</h1>
    <p><a href="support.html">Support</a></p>
    <p><a href="privacy.html">Privacy Policy</a></p>
  </main>
</body>
</html>
